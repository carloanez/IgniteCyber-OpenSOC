input {
  file {
    path => "/var/log/zeek/conn.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "conn"]
  }
  file {
    path => "/var/log/zeek/http.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "http"]
  }
  file {
    path => "/var/log/zeek/dns.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "dns"]
  }
  file {
    path => "/var/log/zeek/files.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "files"]
  }
  file {
    path => "/var/log/zeek/ldap.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "ldap"]
  }
  file {
    path => "/var/log/zeek/ldap_search.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "ldap_search"]
  }
  file {
    path => "/var/log/zeek/packet_filter.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["zeek", "packet_filter"]
  }
}

filter {
  # Skip comment lines
  if [message] =~ /^#/ {
    drop {}
  }

  # Parse conn.log
  if "conn" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{uid}	%{[source][ip]}	%{[source][port]}	%{[destination][ip]}	%{[destination][port]}	%{[network][transport]}	%{[network][protocol]}	%{duration}	%{orig_bytes}	%{resp_bytes}	%{conn_state}	%{local_orig}	%{local_resp}	%{missed_bytes}	%{history}	%{orig_pkts}	%{orig_ip_bytes}	%{resp_pkts}	%{resp_ip_bytes}	%{tunnel_parents}	%{ip_proto}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "conn"
        "[event][dataset]" => "zeek.conn"
        "[event][module]" => "zeek"
      }
    }
  }

  # Parse http.log
  if "http" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{uid}	%{[source][ip]}	%{[source][port]}	%{[destination][ip]}	%{[destination][port]}	%{trans_depth}	%{method}	%{host}	%{uri}	%{referrer}	%{version}	%{user_agent}	%{origin}	%{request_body_len}	%{response_body_len}	%{status_code}	%{status_msg}	%{info_code}	%{info_msg}	%{tags}	%{username}	%{password}	%{proxied}	%{orig_fuids}	%{orig_filenames}	%{orig_mime_types}	%{resp_fuids}	%{resp_filenames}	%{resp_mime_types}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "http"
        "[event][dataset]" => "zeek.http"
        "[event][module]" => "zeek"
        "[url][original]" => "%{[uri]}"
      }
    }
  }

  # Parse dns.log
  if "dns" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{uid}	%{[source][ip]}	%{[source][port]}	%{[destination][ip]}	%{[destination][port]}	%{proto}	%{trans_id}	%{rtt}	%{[dns][question][name]}	%{qclass}	%{qclass_name}	%{qtype}	%{[dns][question][type]}	%{rcode}	%{[dns][response_code]}	%{AA}	%{TC}	%{RD}	%{RA}	%{Z}	%{answers}	%{TTLs}	%{rejected}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "dns"
        "[event][dataset]" => "zeek.dns"
        "[event][module]" => "zeek"
      }
    }
  }

# Parse ldap.log
  if "ldap" in [tags] and "ldap_search" not in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{uid}	%{[source][ip]}	%{[source][port]}	%{[destination][ip]}	%{[destination][port]}	%{message_id}	%{version}	%{opcode}	%{result}	%{diagnostic_message}	%{object}	%{argument}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "ldap"
        "[event][dataset]" => "zeek.ldap"
        "[event][module]" => "zeek"
      }
    }
  }

  # Parse ldap_search.log
  if "ldap_search" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{uid}	%{conn_uids}	%{[source][ip]}	%{[source][port]}	%{[destination][ip]}	%{[destination][port]}	%{proto}	%{filter}	%{attributes}	%{scope}	%{deref_aliases}	%{result}	%{diagnostic_message}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "ldap_search"
        "[event][dataset]" => "zeek.ldap_search"
        "[event][module]" => "zeek"
      }
    }
  }

  # Parse files.log
  if "files" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{fuid}	%{[source][ip]}	%{[destination][ip]}	%{conn_uids}	%{source}	%{depth}	%{analyzers}	%{[file][mime_type]}	%{filename}	%{duration}	%{local_orig}	%{is_orig}	%{seen_bytes}	%{total_bytes}	%{missing_bytes}	%{overflow_bytes}	%{timedout}	%{parent_fuid}	%{md5}	%{sha1}	%{sha256}	%{extracted}	%{extracted_cutoff}	%{extracted_size}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "files"
        "[event][dataset]" => "zeek.files"
        "[event][module]" => "zeek"
      }
    }
  }

  # Parse packet_filter.log
  if "packet_filter" in [tags] {
    dissect {
      mapping => {
        "message" => "%{ts}	%{node}	%{filter}	%{init}	%{success}	%{failure_reason}"
      }
    }
    mutate {
      add_field => {
        "[@metadata][index]" => "packet_filter"
        "[event][dataset]" => "zeek.packet_filter"
        "[event][module]" => "zeek"
      }
    }
  }

  # Set @timestamp from ts field
  if [ts] {
    date {
      match => ["ts", "UNIX"]
      target => "@timestamp"
    }
  }

  # Clean up nulls
  mutate {
    gsub => ["message", "^-$", ""]
  }
}

output {
  opensearch {
    hosts => ["https://localhost:9200"]
    user => "admin"
    password => "SecretPassword"
    ssl => true
    ssl_certificate_verification => false
    cacert => "/etc/ssl/root-ca.pem"
    index => "zeek-%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }
}